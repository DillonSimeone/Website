<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe | Digital City Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <header>
            <h1>UNIVERSE</h1>
            <p class="subtitle">Repository City Visualizer</p>
        </header>
        
        <div id="file-info" class="panel">
            <div class="panel-header">FILE SYSTEM NODE</div>
            <div class="panel-content">
                <div class="info-row">
                    <span class="label">NAME:</span>
                    <span id="node-name" class="value">--</span>
                </div>
                <div class="info-row">
                    <span class="label">PATH:</span>
                    <a id="node-path" class="value link-value" target="_blank" href="#">--</a>
                </div>
                <div class="info-row">
                    <span class="label">SIZE:</span>
                    <span id="node-size" class="value">--</span>
                </div>
                <div class="info-row">
                    <span class="label">TYPE:</span>
                    <span id="node-type" class="value">--</span>
                </div>
                <div class="info-row zoom-row">
                    <button id="zoom-btn" class="action-btn">ZOOM IN</button>
                </div>
            </div>
        </div>

        <div id="controls-hint" class="panel">
            <div class="panel-content">
                <p><strong>W/A/S/D:</strong> Move Camera</p>
                <p><strong>Q/E:</strong> Rotate</p>
                <p><strong>F/R:</strong> Down/Up</p>
                <p><strong>I:</strong> Toggle Fog</p>
                <p><strong>R-CLICK (Hold):</strong> Look Around</p>
                <p><strong>L-CLICK:</strong> Select Building</p>
                <p><strong>L-DBLCLICK:</strong> Zoom Focus</p>
            </div>
        </div>
    </div>

    <div id="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p>CONSTRUCTING UNIVERSE...</p>
        </div>
    </div>

    <!-- Shaders -->
    <script id="building-vs" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vPosition;
        
        void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position, 1.0);
        }
    </script>

    <script id="building-fs" type="x-shader/x-fragment">
        uniform vec3 color;
        uniform float time;
        varying vec2 vUv;
        varying vec3 vNormal;
        varying vec3 vPosition;

        void main() {
            float glow = 0.5 + 0.5 * sin(time * 2.0 + vPosition.y * 0.1);
            float rim = 1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0);
            
            vec3 finalColor = color;
            
            // Add grid windows
            float windows = step(0.8, fract(vUv.x * 4.0)) * step(0.8, fract(vUv.y * 10.0));
            finalColor += windows * 0.3 * color;
            
            // Add glow edges
            finalColor += color * pow(rim, 3.0) * 0.5;
            
            gl_FragColor = vec4(finalColor, 0.9);
        }
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="universe.js"></script>
</body>
</html>
