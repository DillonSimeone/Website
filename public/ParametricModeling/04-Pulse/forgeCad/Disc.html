<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCAD Studio - Haptic Disc</title>
    <style>
        :root {
            --bg-dark: #020617;
            --accent-brand: #f472b6;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-mono: 'Fira Code', 'JetBrains Mono', monospace;
        }
        body {
            margin: 0; padding: 0; background: var(--bg-dark); color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
            display: flex; height: 100vh;
        }
        #studio-panel {
            width: 420px; background: #0f172a; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 100;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        .panel-header {
            padding: 24px; border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .logo {
            font-size: 1.4rem; font-weight: 900; letter-spacing: -1px;
            display: flex; align-items: center; gap: 12px;
        }
        .logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(to bottom right, var(--accent-brand), var(--secondary));
            border-radius: 8px; display: grid; place-items: center; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(244, 114, 182, 0.4);
        }
        .panel-content {
            flex: 1; overflow-y: auto; padding: 18px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .section-title {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: #64748b; margin-top: 10px; margin-bottom: 6px; font-weight: 700;
        }
        .ph { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
        .val { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-brand); background: #1e293b; padding: 1px 6px; border-radius: 4px; }
        input[type="range"] { width: 100%; height: 3px; background: #334155; border-radius: 2px; appearance: none; outline: none; margin: 6px 0; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--accent-brand); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 8px var(--accent-brand); }
        #viewport-container { flex: 1; position: relative; background: #020617; }
        #viewer { width: 100%; height: 100%; }
        .viewport-badge {
            position: absolute; top: 24px; right: 24px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border);
            font-size: 0.8rem; display: flex; align-items: center; gap: 8px; z-index: 1000;
        }
        .status-dot { width: 8px; height: 8px; background: var(--accent-brand); border-radius: 50%; box-shadow: 0 0 8px var(--accent-brand); }
        button.dl-btn {
            background: #1e293b; color: white; border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
            width: 100%; margin-top: 5px; font-size: 0.75rem; transition: all 0.2s;
        }
        button.dl-btn:hover { background: #334155; border-color: var(--accent-brand); }
        .dl-main { background: var(--accent-brand); color: #111; border: none; }
        .dl-main:hover { background: #db2777; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ebtn {
            background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--border);
            padding: 8px 4px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;
            transition: all 0.15s; font-weight: 600;
        }
        .ebtn:hover { background: rgba(255,255,255,0.1); color: white; border-color: #64748b; }
        .ebtn.active { background: var(--accent-brand); color: #111; border-color: var(--accent-brand); box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
    </style>
</head>
<body>
    <div id="studio-panel">
        <div class="panel-header">
            <div class="logo">
                <div class="logo-box">S</div>
                ForgeCAD <span style="font-weight: 300; opacity: 0.5;">Haptic Disc</span>
            </div>
        </div>
        <div class="panel-content">
            <div class="section-title">Assembly Control</div>
            <div id="params-assembly"></div>

            <div class="section-title">Disc Housing</div>
            <div id="params-housing"></div>

            <div class="section-title">Motor & Clamp</div>
            <div id="params-motor"></div>

            <div class="section-title">Motor Driver (MX1508)</div>
            <div id="params-driver"></div>

            <div class="section-title">ESP32-C3 SuperMini</div>
            <div id="params-digital"></div>

            <div class="section-title">Power System</div>
            <div id="params-power"></div>

            <div class="section-title">Edge Screws (M3)</div>
            <div id="params-screws"></div>

            <div class="section-title">Component Explorer</div>
            <div class="param-group">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <button class="ebtn" data-k="motor">Motor</button>
                    <button class="ebtn" data-k="driver">MX1508</button>
                    <button class="ebtn" data-k="esp32">ESP32</button>
                    <button class="ebtn" data-k="battery">Battery</button>
                    <button class="ebtn" data-k="charger">TP4056</button>
                    <button class="ebtn" data-k="switch">Switch</button>
                    <button class="ebtn" data-k="all">All</button>
                    <button class="ebtn" data-k="">Clear</button>
                </div>
            </div>

            <div class="section-title" style="margin-top:20px">Settings Management</div>
            <div class="grid-2">
                <button class="dl-btn" id="copy-settings">COPY SETTINGS</button>
                <button class="dl-btn" id="load-settings">LOAD SETTINGS</button>
            </div>

            <div class="section-title" style="margin-top:20px">Manufacturing Export</div>
            <button class="dl-btn dl-main" id="dl-top">EXPORT TOP SHELL (.STL)</button>
            <button class="dl-btn" id="dl-btm">EXPORT BOTTOM SHELL (.STL)</button>
            <button class="dl-btn" id="dl-sled">EXPORT SLED (.STL)</button>
        </div>
    </div>

    <div id="viewport-container">
        <div id="viewer"></div>
        <div class="viewport-badge">
            <div class="status-dot"></div>
            DISC DESIGN MODE
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';
        import Module from 'https://unpkg.com/manifold-3d/manifold.js';

        let wasm, Manifold;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, (window.innerWidth - 420) / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 420, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(150, 120, 150);
        controls.update();

        scene.add(new THREE.HemisphereLight(0xffffff, 0x111827, 0.8));
        const p1 = new THREE.PointLight(0xf472b6, 1.5, 1000); p1.position.set(200, 200, 200); scene.add(p1);
        const p2 = new THREE.PointLight(0xa855f7, 1, 1000); p2.position.set(-200, 100, -200); scene.add(p2);
        const grid = new THREE.GridHelper(600, 60, 0x1e293b, 0x0f172a);
        grid.position.y = -60; scene.add(grid);

        let currentMeshes = {};
        let currentModels = {};
        let HL = null;

        window.setHighlight = (key) => {
            HL = key || null;
            document.querySelectorAll('.ebtn').forEach(b => {
                b.classList.toggle('active', b.dataset.k === key && key !== "");
            });
            requestUpdate();
        };
        document.querySelectorAll('.ebtn').forEach(b => {
            b.addEventListener('click', () => window.setHighlight(b.dataset.k));
        });

        // --- ForgeCAD Param API ---
        const PARAMS = {};
        const param = (name, defaultValue, options = {}, category = 'housing') => {
            const id = name.replace(/\s+/g, '-').toLowerCase();
            if (!PARAMS[id]) {
                const type = options.type ?? 'range';
                const min = options.min ?? 0;
                const max = options.max ?? (defaultValue * 3);
                const step = options.step ?? (max - min > 50 ? 1 : 0.1);
                PARAMS[id] = { value: defaultValue, min, max, step, name, category, type };
                createParamUI(id, category);
            }
            return PARAMS[id].value;
        };

        const toggle = (name, defaultValue, category = 'assembly') => {
            const id = name.replace(/\s+/g, '-').toLowerCase();
            if (!PARAMS[id]) {
                PARAMS[id] = { value: defaultValue, name, category, type: 'checkbox' };
                createParamUI(id, category);
            }
            return PARAMS[id].value;
        };

        function createParamUI(id, cat) {
            const p = PARAMS[id];
            let container = document.getElementById('params-' + cat) || document.getElementById('params-housing');
            if (!container.querySelector('.param-group')) {
                const g = document.createElement('div'); g.className = 'param-group';
                container.appendChild(g);
            }
            const group = container.querySelector('.param-group');
            const row = document.createElement('div');
            
            if (p.type === 'checkbox') {
                row.style.display = 'flex';
                row.style.justifyContent = 'space-between';
                row.style.alignItems = 'center';
                row.style.marginBottom = '8px';
                row.innerHTML = `<div class="ph" style="margin:0">${p.name}</div>
                    <input type="checkbox" id="input-${id}" ${p.value ? 'checked' : ''} style="width:20px; height:20px; cursor:pointer; accent-color:var(--accent-brand)">`;
                row.querySelector('input').addEventListener('change', (e) => {
                    PARAMS[id].value = e.target.checked;
                    requestUpdate();
                });
            } else {
                row.innerHTML = `<div class="ph">${p.name} <span class="val" id="val-${id}">${p.value}</span></div>
                    <input type="range" id="input-${id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.value}">`;
                row.querySelector('input').addEventListener('input', (e) => {
                    PARAMS[id].value = parseFloat(e.target.value);
                    document.getElementById(`val-${id}`).innerText = PARAMS[id].value;
                    requestUpdate();
                });
            }
            group.appendChild(row);
        }

        // --- Primitives (Manifold API: cylinder(height, r1, r2, segments, center)) ---
        const box = (w, h, d) => Manifold.cube([w, h, d], true);
        const cyl = (r, h, s=64) => Manifold.cylinder(h, r, r, s, true);
        const cone = (r1, r2, h, s=80) => Manifold.cylinder(h, r1, r2, s, true);

        function exportSTL(model, name) {
            if (!model) return;
            const mesh = model.getMesh();
            let stl = `solid ${name}\n`;
            for (let i = 0; i < mesh.triVerts.length; i += 3) {
                const i1 = mesh.triVerts[i], i2 = mesh.triVerts[i+1], i3 = mesh.triVerts[i+2];
                const v1 = [mesh.vertProperties[i1*3], mesh.vertProperties[i1*3+1], mesh.vertProperties[i1*3+2]];
                const v2 = [mesh.vertProperties[i2*3], mesh.vertProperties[i2*3+1], mesh.vertProperties[i2*3+2]];
                const v3 = [mesh.vertProperties[i3*3], mesh.vertProperties[i3*3+1], mesh.vertProperties[i3*3+2]];
                stl += `facet normal 0 0 0\n  outer loop\n    vertex ${v1[0]} ${v1[1]} ${v1[2]}\n    vertex ${v2[0]} ${v2[1]} ${v2[2]}\n    vertex ${v3[0]} ${v3[1]} ${v3[2]}\n  endloop\nendfacet\n`;
            }
            stl += `endsolid ${name}`;
            const blob = new Blob([stl], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${name}.stl`; a.click();
            URL.revokeObjectURL(url);
        }

        async function init() {
            wasm = await Module(); wasm.setup(); Manifold = wasm.Manifold;
            requestUpdate(); animate();
        }

        function requestUpdate() {
            if (!Manifold) return;
            Object.values(currentMeshes).forEach(m => scene.remove(m));
            if (currentModels.topShell) {
                try { currentModels.topShell.delete(); } catch(e){}
                try { currentModels.btmShell.delete(); } catch(e){}
                try { currentModels.sled.delete(); } catch(e){}
                if(currentModels.pock) Object.values(currentModels.pock).forEach(p => { try{p.delete();}catch(e){} });
                if(currentModels.alignPins) { try{currentModels.alignPins.delete();}catch(e){} }
                if(currentModels.clamp) { try{currentModels.clamp.delete();}catch(e){} }
            }
            currentMeshes = {};

            try {
                // ===== PARAMETERS =====
                const slicerMode = toggle("Slicer Mode", false, "assembly");
                const expl = param("Explosion", 17, { min:0, max:100 }, "assembly") / 100;

                const discR = param("Disc Radius", 40, { min:40, max:120 }, "housing");
                const discH = param("Total Height", 30, { min:15, max:60 }, "housing");
                const wall    = param("Wall Thick", 2.5, { min:1.5, max:6 }, "housing");
                const wireChW = param("Wire Groove", 4, { min:2, max:12 }, "housing");
                const splitZ  = param("Split Height", 0.5, { min:0.15, max:0.85 }, "housing");
                const wireX = param("Wire Hole X", 12, { min:-40, max:40 }, "housing");
                const wireY = param("Wire Hole Y", 12, { min:-40, max:40 }, "housing");

                // Motor: Type 130 DC
                const motorW = param("Motor Width", 16, { min:5, max:35 }, "motor");
                const motorH = param("Motor Height", 12, { min:5, max:35 }, "motor");
                const motorL = param("Motor Sled Cutout Length", 19, { min:10, max:50 }, "motor");
                const clampL = param("Clamp Length", 19, { min:5, max:30 }, "motor");
                const clampScN = param("Pinch Screws", 1, { min:1, max:3, step:1 }, "motor");
                const clampScD = param("Pinch Screw D", 3.2, { min:2, max:6 }, "motor");
                const clGap    = param("Pinch Gap", 2.5, { min:1, max:8 }, "motor");
                const stopThick = param("Thickness Anti-slip Ring", 3.0, { min:0.5, max:8 }, "motor");

                // MX1508 driver: ~25x21x5mm
                const drvW = param("Driver Width", 25, { min:15, max:35 }, "driver");
                const drvD = param("Driver Depth", 21, { min:12, max:30 }, "driver");
                const drvH = param("Driver Height", 5, { min:3, max:12 }, "driver");
                const drvX = param("Driver X", 0, { min:-60, max:60 }, "driver");
                const drvY = param("Driver Y", 26, { min:-60, max:60 }, "driver");
                const drvR = param("Driver Rot", 0, { min:0, max:360 }, "driver");
                const drvBtm = toggle("Driver on Bottom", true, "driver");

                // ESP32-C3 SuperMini: 22.5x18x3.2mm (lying flat on sled)
                const espW = param("ESP Width", 22.5, { min:15, max:30 }, "digital");
                const espD = param("ESP Depth", 18, { min:10, max:25 }, "digital");
                const espH = param("ESP Height", 3.2, { min:2, max:8 }, "digital");
                const espX = param("ESP X", 4, { min:-60, max:60 }, "digital");
                const espY = param("ESP Y", -27, { min:-60, max:60 }, "digital");
                const espR = param("ESP Rot", 0, { min:0, max:360 }, "digital");
                const espBtm = toggle("ESP on Bottom", false, "digital");

                // Battery
                const batW = param("Battery Width", 20, { min:10, max:40 }, "power");
                const batD = param("Battery Depth", 30, { min:15, max:50 }, "power");
                const batH = param("Battery Height", 8, { min:3, max:18 }, "power");
                const batX = param("Battery X", 0, { min:-60, max:60 }, "power");
                const batY = param("Battery Y", 25, { min:-60, max:60 }, "power");
                const batR = param("Battery Rot", 90, { min:0, max:360 }, "power");
                const batBtm = toggle("Battery on Bottom", false, "power");

                // TP4056: ~25x19x4mm (lying flat, USB port at saucer edge)
                const chW = param("Charger Width", 25, { min:15, max:35 }, "power");
                const chD = param("Charger Depth", 19, { min:10, max:25 }, "power");
                const chH = param("Charger Height", 4, { min:2, max:10 }, "power");
                const switchAng = param("Switch Position", 180, { min:0, max:360 }, "power");

                // Edge screws
                const screwD = param("Screw Size", 1.5, { min:1, max:5 }, "screws");
                const screwN = param("Screw Count", 4, { min:0, max:12, step:1 }, "screws");
                const screwRing = param("Screw Ring %", 0.9, { min:0.5, max:0.95 }, "screws");
                const screwRot = param("Screw Rotation", 40, { min:0, max:360 }, "screws") * (Math.PI / 180);
                const headD = param("Screw Head D", 5.5, { min:2, max:10 }, "screws");
                const bossD = param("Screw Boss D", 8, { min:3, max:15 }, "screws");
                const headDepth = param("Head Depth", 10, { min:0, max:20 }, "screws");
                const wireD = param("Wire Hole D", 5, { min:0, max:12 }, "housing");

                // Constants for internal layout
                const sledH = param("Sled Thickness", 3, { min:1, max:10 }, "housing"); // Components sit in 0.5mm grooves

                // ===== DERIVED GEOMETRY (Cylinder with optional Chamfer) =====
                const rimR = discR;
                const halfH = discH / 2;
                const splitLine = -halfH + discH * splitZ; // Z where top/bottom shells meet

                // Main Cylinder
                let outerFull = cyl(rimR, discH, 80);
                
                // Inner cavity
                const iR = Math.max(0.1, rimR - wall);
                const iH = Math.max(0.1, discH - wall * 2);
                let innerFull = cyl(iR, iH, 80);

                // USB-C Precision Cutout and Flat Face
                const chDist = rimR - chW / 2 + 1.5; // Poke out 1.5mm
                const usbFlatDist = rimR - 2.5;
                let usbFlat = box(10, 20, discH).translate([usbFlatDist + 5, 0, 0]);
                let usbHole = box(10, 11, 5).translate([rimR, 0, splitLine + sledH/2 + chH / 2]); 
                
                let fullShell = outerFull.subtract(innerFull).subtract(usbFlat).subtract(usbHole);

                // Power Switch Slot (12mm x 19.5mm) — on OPPOSITE side from USB-C
                const swW = 12, swD = 19.5, swH = 15;
                // Manifold .rotate() takes DEGREES, not radians
                // Add Flat Face for Switch
                let swFlat = box(10, swW + 6, discH).translate([rimR - 2.5 + 5, 0, 0]);
                let swFlatRot = swFlat.rotate([0, 0, switchAng]);
                fullShell = fullShell.subtract(swFlatRot);
                swFlat.delete(); swFlatRot.delete();

                // Cut the Switch Slot (Centered on Flat Face)
                let swCut = box(swD, swW, swH).translate([rimR - swD/2 + 2.5, 0, 0]);
                let swCutRot = swCut.rotate([0, 0, switchAng]);
                fullShell = fullShell.subtract(swCutRot);
                swCut.delete(); swCutRot.delete();

                // 4. SCREW HOLES & BOSSES
                let screwHoles = null;
                let bosses = null;
                let headCuts = null;
                
                for (let i = 0; i < screwN; i++) {
                    const ang = (i / screwN) * Math.PI * 2 + screwRot;
                    const sx = Math.cos(ang) * (rimR * screwRing);
                    const sy = Math.sin(ang) * (rimR * screwRing);
                    
                    // The main screw shaft hole
                    let h = cyl(screwD / 2, discH + 20, 16).translate([sx, sy, 0]);
                    
                    // The structural boss (extra material around the hole)
                    let b = cyl(bossD / 2, discH, 32).translate([sx, sy, 0]);
                    
                    const topSurfZ = halfH;
                    const btmSurfZ = -halfH;
                    
                    const cbDepth = headDepth;
                    let cTop = cyl(headD / 2, 20).translate([sx, sy, topSurfZ + 10 - cbDepth]);
                    let cBtm = cyl(headD / 2, 20).translate([sx, sy, btmSurfZ - 10 + cbDepth]);
                    
                    if (!screwHoles) { 
                        screwHoles = h; 
                        bosses = b;
                        headCuts = cTop.add(cBtm); 
                    } else { 
                        let nh = screwHoles.add(h); screwHoles.delete(); h.delete(); screwHoles = nh;
                        let nb = bosses.add(b); bosses.delete(); b.delete(); bosses = nb;
                        let nc = headCuts.add(cTop).add(cBtm); headCuts.delete(); cTop.delete(); cBtm.delete(); headCuts = nc;
                    }
                }
                
                // Add bosses to the shell before subtracting holes
                // We intersect bosses with outerFull so they don't protrude
                if (bosses) {
                    let cappedBosses = bosses.intersect(outerFull);
                    fullShell = fullShell.add(cappedBosses);
                    cappedBosses.delete();
                }
                
                // Subtract everything
                if (screwHoles) fullShell = fullShell.subtract(screwHoles);
                if (headCuts) fullShell = fullShell.subtract(headCuts);
                
                // Split into top (+Z) and bottom (-Z) halves
                // Top shell is the one with the clamp
                let topCutter = box(rimR * 3, rimR * 3, discH).translate([0, 0, splitLine - sledH/2 - discH / 2]);
                let topShell = fullShell.subtract(topCutter);
                let btmCutter = box(rimR * 3, rimR * 3, discH).translate([0, 0, splitLine + sledH/2 + discH / 2]);
                let btmShell = fullShell.subtract(btmCutter);

                // ===== MOTOR MOUNTING (Tight Collar + Screw Boss, Hanging from Top Shell) =====
                let clR = Math.max(motorW, motorH) / 2 + 0.5;
                const btmFloorZ = -halfH + wall;
                const topCeilingZ = halfH - wall;
                
                const innerR = Math.max(motorW, motorH) / 2 + 0.3;
                const collarWall = 2.0;

                // 1. Collar Block: hangs from Top Shell (+Z side)
                const Z_CONN = halfH;
                const Z_FREE = -halfH;
                
                // Motor is near the connection (Top Shell) - 0.5mm gap from ceiling
                const motorZ = Z_CONN - wall - innerR - 0.5; 
                
                // Bosses (ears) are just below the motor (towards -Z)
                const earW = 6, earH = 7, earLen = Math.min(10, clampL);
                const bossZ = motorZ - innerR - 0.2 - earH / 2; 
                
                const collarTop = Z_CONN; 
                const collarBtm = motorZ - innerR - 0.2; // Block ends at motor bottom
                const collarH = collarTop - collarBtm; // Positive height
                const collarW = innerR * 2 + 4; 
                
                let cradleSolid = box(collarW, clampL, collarH)
                    .translate([0, 0, collarTop - collarH / 2]);
                
                // 2. Carve motor bore
                let motorBore = cyl(innerR, clampL + 2, 64).rotate([90, 0, 0]).translate([0, 0, motorZ]);
                cradleSolid = cradleSolid.subtract(motorBore);
                
                // 3. Pinch gap — from FREE END (-Z) up towards hinge
                //    Hinge stays solid at the connection end (+Z)
                const gapHingeZ = motorZ + innerR + 2; 
                const gapH = gapHingeZ - (bossZ - earH/2) + 5; 
                let gapCut = box(clGap, clampL + 10, gapH)
                    .translate([0, 0, gapHingeZ - gapH / 2]);
                cradleSolid = cradleSolid.subtract(gapCut);
                
                // 4. Screw Boss Ears (Narrowed for short screws)
                const bossWidth = clGap + earW * 2; 
                let earLeft = box(earW, earLen, earH)
                    .translate([-clGap/2 - earW/2, 0, bossZ]);
                let earRight = box(earW, earLen, earH)
                    .translate([ clGap/2 + earW/2, 0, bossZ]);
                cradleSolid = cradleSolid.add(earLeft).add(earRight);
                earLeft.delete(); earRight.delete();
                
                // 5. Pinch Screw Holes (horizontal, through the bosses)
                let pinchHoles = null;
                for (let i = 0; i < clampScN; i++) {
                    const spacing = earLen / (clampScN + 1);
                    const yOff = (i + 1) * spacing - earLen/2;
                    let ph = cyl(clampScD/2, bossWidth + 20, 16).rotate([0, 90, 0]).translate([0, yOff, bossZ]);
                    if (!pinchHoles) { pinchHoles = ph; } 
                    else { let n = pinchHoles.add(ph); pinchHoles.delete(); ph.delete(); pinchHoles = n; }
                }
                if (pinchHoles) cradleSolid = cradleSolid.subtract(pinchHoles);
                
                // 6. Nut Trap (in one ear)
                const nutFlat = clampScD * 1.75; 
                const nutDepth = 3.0; 
                let nutTrap = cyl(nutFlat / 2, nutDepth, 6).rotate([0, 90, 0])
                    .translate([clGap/2 + earW - nutDepth/2, 0, bossZ]);
                cradleSolid = cradleSolid.subtract(nutTrap);
                
                // 7. Motor End-Stop (BACK only)
                let stopWall = box(collarW, stopThick, collarH)
                    .translate([0, -clampL/2 - stopThick/2, collarTop - collarH / 2]);
                let stopBore = cyl(innerR * 0.5, stopThick + 2, 32).rotate([90, 0, 0])
                    .translate([0, -clampL/2 - stopThick/2, motorZ]);
                let stopGap = box(clGap, stopThick + 2, gapH)
                    .translate([0, -clampL/2 - stopThick/2, gapHingeZ - gapH / 2]);
                stopWall = stopWall.subtract(stopBore).subtract(stopGap);
                cradleSolid = cradleSolid.add(stopWall);
                stopBore.delete(); stopGap.delete();

                // Subtract clamp cavity from bottom shell for clearance
                btmShell = btmShell.subtract(cradleSolid);

                // 8. Wiring Harness (Removed)
                
                // ===== SLED (Middle layer disc) =====
                const sledR = rimR;
                let sled = cyl(sledR, sledH, 80).translate([0, 0, splitLine]);
                
                // Center cutout for motor and clamp (3mm buffer)
                const cutoutW = collarW + 6; 
                const cutoutL = Math.max(motorL, clampL + stopThick) + 6;
                let motorCutout = box(cutoutW, cutoutL, sledH + 2).translate([0, 0, splitLine]);
                sled = sled.subtract(motorCutout);
                motorCutout.delete();

                // Wire Hole in Sled (Dynamic position)
                let wHole = cyl(wireD/2, sledH + 2, 32).translate([wireX, wireY, splitLine]);
                sled = sled.subtract(wHole);
                wHole.delete();

                if (screwHoles) sled = sled.subtract(screwHoles);

                // ===== COMPONENT POCKETS (Recessed into Sled) =====
                let pock = {};
                const pZ = splitLine + sledH/2; // top of sled
                const pZb = splitLine - sledH/2; // bottom of sled
                const recess = 0.5; // 0.5mm grooves for components
                // MX1508 driver (Dynamic)
                let dZ = drvBtm ? (pZb + recess - drvH / 2) : (pZ - recess + drvH / 2);
                pock.driver = box(drvW + 0.5, drvD + 0.5, drvH + 0.5).rotate([0, 0, drvR]).translate([drvX, drvY, dZ]);

                // ESP32-C3 SuperMini (Dynamic)
                let eZ = espBtm ? (pZb + recess - espH / 2) : (pZ - recess + espH / 2);
                pock.esp32 = box(espW + 0.5, espD + 0.5, espH + 0.5).rotate([0, 0, espR]).translate([espX, espY, eZ]);

                // Battery (Dynamic)
                let bZ = batBtm ? (pZb + recess - batH / 2) : (pZ - recess + batH / 2);
                pock.battery = box(batW + 0.5, batD + 0.5, batH + 0.5).rotate([0, 0, batR]).translate([batX, batY, bZ]);

                // TP4056 charger (flat on TOP of sled, USB facing edge)
                pock.charger = box(chW + 0.5, chD + 0.5, chH + 0.5).translate([chDist, 0, pZ - recess + chH / 2]);

                // Power Switch
                pock.switch = box(swD - 0.5, swW - 0.5, swH - 0.5).translate([rimR - swD/2 + 2.5, 0, 0]).rotate([0, 0, switchAng]);

                // Subtract pockets from sled
                Object.values(pock).forEach(p => sled = sled.subtract(p));

                // Wire routing hole
                if (wireD > 0) {
                    let wHole = cyl(wireD/2, 20).translate([rimR * 0.3, rimR * 0.3, splitLine]);
                    sled = sled.subtract(wHole);
                    wHole.delete();
                }
                
                // 9. Alignment Pins (Removed)
                
                currentModels = { topShell, btmShell, sled, pock, expl, clamp: cradleSolid };

                // ===== RENDER =====
                const toMesh = (model, color, op, offset = [0, 0, 0]) => {
                    const m = model.getMesh();
                    const g = new THREE.BufferGeometry();
                    g.setAttribute('position', new THREE.Float32BufferAttribute(m.vertProperties, 3));
                    g.setIndex(new THREE.Uint32BufferAttribute(m.triVerts, 1));
                    g.computeVertexNormals();
                    
                    const mat = new THREE.MeshPhysicalMaterial({ 
                        color, 
                        transparent: !slicerMode, 
                        opacity: slicerMode ? 1.0 : op, 
                        metalness: slicerMode ? 0.0 : 0.4, 
                        roughness: slicerMode ? 1.0 : 0.2, 
                        side: THREE.DoubleSide 
                    });
                    
                    const mesh = new THREE.Mesh(g, mat);
                    mesh.rotateX(-Math.PI / 2); // Align Model Z with World Y (Up)
                    mesh.position.set(offset[0], offset[1], offset[2]);
                    scene.add(mesh);
                    return mesh;
                };

                // Use World Space offsets (+Y = Up, -Y = Down)
                currentMeshes.top  = toMesh(topShell, 0x00ffff, 0.4, [0,  expl * 120, 0]);
                currentMeshes.btm  = toMesh(btmShell, 0xff00ff, 0.4, [0, -expl * 120, 0]);
                currentMeshes.clamp = toMesh(cradleSolid, 0xa855f7, 0.7, [0, expl * 120, 0]);
                currentMeshes.sled = toMesh(sled, 0xa855f7, 0.9, [0, 0, 0]);

                const colors = { motor: 0xff4488, driver: 0x4488ff, esp32: 0xffcc00, battery: 0x44ff88, charger: 0x8844ff, switch: 0xff0000 };
                if (HL === "all") {
                    Object.keys(pock).forEach((k) => {
                        const off = (k === "motor" || k === "clamp") ? [0, expl * 120, 0] : 
                                    (k === "switch") ? [0, -expl * 120, 0] : [0,0,0];
                        const m = toMesh(pock[k], colors[k] || 0xffffff, 0.8, off);
                        m.material.emissive = new THREE.Color(colors[k] || 0xffffff);
                        m.material.emissiveIntensity = 0.5;
                        currentMeshes[`hl_${k}`] = m;
                    });
                } else if (HL && pock[HL]) {
                    const off = (HL === "motor") ? [0, expl * 120, 0] : [0,0,0];
                    const m = toMesh(pock[HL], colors[HL] || 0x10b981, 0.85, off);
                    m.material.emissive = new THREE.Color(colors[HL] || 0x10b981);
                    m.material.emissiveIntensity = 0.5;
                    currentMeshes.hl = m;
                }

                // Cleanup WASM
                outerFull.delete(); innerFull.delete(); 
                fullShell.delete(); topCutter.delete(); btmCutter.delete(); usbFlat.delete(); usbHole.delete();
                motorBore.delete(); gapCut.delete(); nutTrap.delete(); stopWall.delete();
                // harness is in pock.wires or deleted by currentModels logic
                if (pinchHoles) pinchHoles.delete();
                if (screwHoles) screwHoles.delete();
                if (bosses) bosses.delete();
                if (headCuts) headCuts.delete();

            } catch (e) {
                console.error("Modeling Error:", e);
            }
        }

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 420) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 420, window.innerHeight);
        });

        document.getElementById('dl-top').onclick  = () => {
            // Union clamp with top shell for manufacturing
            let combined = currentModels.topShell.add(currentModels.clamp);
            exportSTL(combined, "Disc_TopShell");
            combined.delete();
        };
        document.getElementById('dl-btm').onclick  = () => exportSTL(currentModels.btmShell, "Disc_BottomShell");
        document.getElementById('dl-sled').onclick  = () => exportSTL(currentModels.sled, "Disc_Sled");

        // Settings Copy/Load
        document.getElementById('copy-settings').onclick = () => {
            const exportData = {};
            for (const id in PARAMS) {
                exportData[id] = PARAMS[id].value;
            }
            const json = JSON.stringify(exportData, null, 2);
            navigator.clipboard.writeText(json).then(() => {
                alert("Settings copied to clipboard!");
            });
        };

        document.getElementById('load-settings').onclick = async () => {
            const input = prompt("Paste settings JSON here:");
            if (!input) return;
            try {
                const imported = JSON.parse(input);
                for (const id in imported) {
                    if (PARAMS[id]) {
                        PARAMS[id].value = imported[id];
                        const ui = document.getElementById(`input-${id}`);
                        const valLabel = document.getElementById(`val-${id}`);
                        if (ui) {
                            if (PARAMS[id].type === 'checkbox') {
                                ui.checked = imported[id];
                            } else {
                                ui.value = imported[id];
                                if (valLabel) valLabel.innerText = imported[id];
                            }
                        }
                    }
                }
                requestUpdate();
            } catch (e) {
                alert("Invalid JSON settings!");
            }
        };

        init();
    </script>
</body>
</html>
