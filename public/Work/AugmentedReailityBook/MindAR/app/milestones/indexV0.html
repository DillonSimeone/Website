<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Augmented Reality Book — Watch illustrations peel off the page and come to life in 3D." />

  <title>AR Book</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- MindAR v1.1.5 bundles Three.js internally -->
  <script src="javascript/mindar-image-three.prod.js"></script>

  <!-- Bridge -->
  <script>window.THREE = window.MINDAR.IMAGE.THREE;</script>

  <!-- GLTFLoader (Three.js r124) -->
  <script src="javascript/GLTFLoader.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "./javascript/v2/three.module.js",
        "three/addons/": "./javascript/v2/",
        "mind-ar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
  </script>

  <!-- GSAP for animations -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <!-- AR Systems -->
  <script src="javascript/smoothing.js"></script>
  <script src="javascript/ghosting.js"></script>
  <script src="javascript/light-estimator.js"></script>


</head>

<body>
  <!-- MindAR renders into this container -->
  <div id="ar-container"></div>

  <!-- ======== Loading Screen ======== -->
  <div id="loading-screen">
    <div class="loading-icon"></div>
    <div class="loading-title">AR Book</div>
    <div class="loading-subtitle">Preparing augmented reality experience…</div>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
  </div>

  <!-- ======== AR Overlay ======== -->
  <div id="ar-overlay">
    <button id="start-ar-btn" class="hidden">START AR</button>

    <div id="status-ribbon">
      <span class="status-dot"></span>
      <span id="status-text">Scanning…</span>
    </div>

    <div id="debug-panel"></div>
  </div>

  <!-- Developer Console -->
  <div id="dev-console"></div>
  <button id="dev-toggle">⚙</button>

  <!-- ======== Error Panel ======== -->
  <div id="error-panel">
    <div class="error-icon">⚠️</div>
    <div class="error-title">AR Not Available</div>
    <div class="error-message"></div>
  </div>

  <!-- ======== App Entry Point ======== -->
  <script type="module" src="javascript/appV0.js?v=44"></script>
</body>

</html>
