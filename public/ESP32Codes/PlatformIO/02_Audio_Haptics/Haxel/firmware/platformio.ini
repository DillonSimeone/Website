; Haxel — PlatformIO project
; See ARCHITECTURE.md for build-time decisions.

[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions.csv
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DCORE_DEBUG_LEVEL=2
    -DHAXEL_VERSION_STR=\"1.0.0-skeleton\"

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    kosme/arduinoFFT@^2.0.2
    fastled/FastLED@^3.7.0
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit BusIO@^1.16.1

board_build.filesystem = littlefs

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
build_flags = ${env.build_flags} -DHAXEL_TARGET_CLASSIC

[env:esp32-s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DHAXEL_TARGET_S3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-c3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DHAXEL_TARGET_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DHB_DEFAULT_SSID=\"CumZone\"
    -DHB_DEFAULT_PASS=\"7414stinky$$$\"

[env:native-test]
platform = native
build_flags = -std=gnu++17 -DHAXEL_HOST_TEST
test_framework = unity
