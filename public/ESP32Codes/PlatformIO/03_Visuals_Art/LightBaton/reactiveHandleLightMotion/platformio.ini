[platformio]
default_envs = esp32c3_mpu6050

[env]
; Pinned to the official Espressif platform (Arduino core 2.0.14), matching the
; Ember project. This keeps both projects on the same shared global toolchain
; and esptool, so neither clobbers the other's tool-esptoolpy.
platform = espressif32@6.6.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    fastled/FastLED @ ^3.6.0

[env:esp32c3_mpu6050]
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSENSOR_MPU6050

[env:esp32c3_mpu6500]
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSENSOR_MPU6500
