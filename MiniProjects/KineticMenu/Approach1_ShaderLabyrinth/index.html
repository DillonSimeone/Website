<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Shader Menu</title>
    <meta name="description" content="A kinetic portfolio menu with dynamic camera choreography and voxel formations.">

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="canvas-mount"></div>

    <div class="ui-overlay">
        <div class="header">
            <div class="header-left">
                <h1>System_State</h1>
                <p id="pose-label">Awaiting_Input</p>
            </div>
            <div class="header-right">
                <p>Kinetic_Portfolio</p>
                <p>Voxel_Count: 128</p>
            </div>
        </div>

        <nav class="menu">
            <button class="menu-btn" data-pose="0">
                <span class="number">01</span>
                <span class="label">About Me</span>
            </button>
            <button class="menu-btn" data-pose="1">
                <span class="number">02</span>
                <span class="label">My Works</span>
            </button>
            <button class="menu-btn" data-pose="2">
                <span class="number">03</span>
                <span class="label">My Miniprojects</span>
            </button>
        </nav>
        <!-- DEVMODE -->
        <div class="dev-container">
            <button id="dev-toggle">DEVMODE</button>
            <div id="dev-menu" class="hidden">
                <h3>CONTROLS</h3>
                <div id="dev-controls"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
