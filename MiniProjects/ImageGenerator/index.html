<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>
        PONY SDXL | High-Contrast Prompt Maker
    </title>
    <meta
        content="Ultimate interactive prompt builder for Pony Diffusion XL. Glassmorphic UI with Danbooru API keyword integration."
        name="description" />
    <link href="style.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>
                PONY XL
                <span style="color:white; opacity:0.3">
                    |
                </span>
                PROMPT MAKER
            </h1>
            <div class="header-actions">
                <button class="action-btn btn-outline" onclick="clearAll()"
                    style="padding: 0.5rem 1.5rem; font-size:0.7rem;">
                    Clear All
                </button>
            </div>
        </header>
        <!-- LEFT SIDEBAR: Categories (Spoilers) -->
        <aside class="sidebar glass-panel" id="sidebar-container">
            <!-- Categories will be dynamically loaded here -->
        </aside>
        <!-- MAIN AREA: Search & Prompt Builder -->
        <main class="main-content">
            <div class="search-container">
                <input autocomplete="off" id="tagSearch" placeholder="Search for tags (Danbooru API)..." type="text" />
                <div class="suggestions-dropdown glass-panel" id="suggestions">
                </div>
            </div>
            <div class="prompt-box glass-panel">
                <div class="category-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>
                        Prompt Workspace
                    </span>
                    <button class="quick-tag" onclick="clearAll()" style="padding: 2px 8px; font-size: 0.6rem;">
                        Clear
                    </button>
                </div>
                <div class="tag-list" id="workspace">
                </div>
                <div class="workspace-footer">
                    <button class="workspace-btn btn-neg" id="loadNegBtn">
                        Toggle Negative
                    </button>
                    <button class="workspace-btn workspace-btn-primary" id="copyPromptBtn">
                        <svg fill="none" height="18" stroke="currentColor" stroke-linecap="round"
                            stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18">
                            <rect height="13" rx="2" ry="2" width="13" x="9" y="9">
                            </rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1">
                            </path>
                        </svg>
                        Copy Prompt
                    </button>
                </div>
                <div id="negativeSection" style="margin-top: 1.5rem; display: none; animation: fadeIn 0.5s;">
                    <div class="category-title" style="color:var(--neon-pink)">
                        Negative Prompt
                    </div>
                    <div class="tag-list" id="finalNegative"
                        style="min-height: 80px; font-family: monospace; font-size: 0.8rem; background: rgba(255,0,0,0.05);">
                    </div>
                    <div class="workspace-footer">
                        <button class="workspace-btn btn-neg" id="copyNegBtn" style="flex:1">
                            Copy Negative
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js">
    </script>
</body>

</html>
