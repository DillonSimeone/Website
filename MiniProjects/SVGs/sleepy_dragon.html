<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleepy Dragon's Lair</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        #scene-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Twinkling stars */
        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .star {
            animation: twinkle 3s infinite ease-in-out;
        }

        .star:nth-child(even) {
            animation-duration: 4s;
            animation-delay: 1s;
        }

        .star:nth-child(3n) {
            animation-duration: 5s;
            animation-delay: 2s;
        }

        /* Breathing dragon */
        @keyframes breathe {

            0%,
            100% {
                transform: scaleY(1) translateY(0);
            }

            50% {
                transform: scaleY(1.02) translateY(-2px);
            }
        }

        #dragon-body-group {
            animation: breathe 6s infinite ease-in-out;
            transform-origin: 50% 80%;
        }

        /* Zzz floating */
        @keyframes floatZzz {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }

            20% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
                transform: translate(20px, -50px) scale(1.5);
            }
        }

        .zzz {
            opacity: 0;
            font-size: 24px;
            font-family: "Comic Sans MS", cursive, sans-serif;
            fill: #a0d8ef;
            font-weight: bold;
            filter: drop-shadow(0 0 2px rgba(160, 216, 239, 0.8));
        }

        .zzz-1 {
            animation: floatZzz 4s infinite linear;
        }

        .zzz-2 {
            animation: floatZzz 4s infinite linear 1.3s;
            font-size: 18px;
        }

        .zzz-3 {
            animation: floatZzz 4s infinite linear 2.6s;
            font-size: 30px;
        }

        /* Snoring Smoke */
        @keyframes smokePuff {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }

            30% {
                opacity: 0.5;
            }

            100% {
                opacity: 0;
                transform: translate(-30px, -40px) scale(2);
            }
        }

        .smoke {
            fill: #d0e0e3;
            opacity: 0;
            filter: blur(4px);
        }

        .smoke-1 {
            animation: smokePuff 6s infinite ease-out 1s;
        }

        .smoke-2 {
            animation: smokePuff 6s infinite ease-out 1.5s;
        }

        .eye-pupil {
            transition: transform 0.05s linear;
            transform-origin: center;
        }

        /* Interactive Lighting */
        .crystal {
            transition: filter 0.3s ease;
        }

        .crystal:hover {
            filter: brightness(1.5) drop-shadow(0 0 15px #00ffcc);
        }
    </style>
</head>

<body>

            <!-- TREASURE HOARD (Background layers) -->

                    <!-- Roar Fire (Hidden by default) -->
                    <g id="dragon-fire" opacity="0"
                        style="transform: scale(0); transform-origin: 600px 750px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                        <path d="M 600,750 Q 750,880 950,650 Q 800,730 650,720 Z" fill="#ff4400" filter="url(#glow)" />
                        <path d="M 610,745 Q 730,820 850,680 Q 750,720 620,730 Z" fill="#ffaa00" />
                        <path d="M 620,740 Q 680,770 750,710 Q 690,730 630,735 Z" fill="#ffffff" />
                    </g>

                    <!-- ===================== -->
                    <!-- EYES (INTERACTIVE)    -->
                    <!-- ===================== -->
                    <g id="dragon-eyes">

                        <!-- LEFT EYE -->
                        <!-- Sclera -->
                        <path d="M 485,630 Q 505,610 525,635 Q 505,650 485,630 Z" fill="url(#eyeSclera)"
                            stroke="#051711" stroke-width="2" />
                        <!-- Eye Base for Javascript Tracking -->
                        <g id="left-eye-base" transform="translate(505, 630)">
                            <!-- Moving Pupil Assembly -->
                            <g id="left-pupil" class="eye-pupil">
                                <ellipse cx="0" cy="0" rx="4" ry="12" fill="#0a0000" />
                                <!-- Eye Highlight -->
                                <circle cx="-2" cy="-4" r="2.5" fill="#ffffff" />
                            </g>
                        </g>

                        <!-- RIGHT EYE -->
                        <path d="M 545,640 Q 565,620 585,650 Q 565,665 545,640 Z" fill="url(#eyeSclera)"
                            stroke="#051711" stroke-width="2" />
                        <g id="right-eye-base" transform="translate(565, 642)">
                            <!-- Moving Pupil Assembly -->
                            <g id="right-pupil" class="eye-pupil">
                                <ellipse cx="0" cy="0" rx="4" ry="12" fill="#0a0000" />
                                <!-- Eye Highlight -->
                                <circle cx="-2" cy="-4" r="2.5" fill="#ffffff" />
                            </g>
                        </g>

                        <!-- HEAVY SLEEPY EYELIDS -->
                        <!-- Left Eyelid -->
                        <path id="left-eyelid" d="M 475,628 Q 505,615 533,638 L 530,595 Q 500,590 470,605 Z"
                            fill="#15513d" stroke="#0c382b" stroke-width="2" />
                        <path id="left-eyelid-curve" d="M 475,628 Q 505,615 533,638" fill="none" stroke="#257a5e"
                            stroke-width="3" stroke-linecap="round" />
                        <!-- Left Lower Lid -->
                        <path d="M 480,634 Q 505,644 528,638" fill="none" stroke="#04120d" stroke-width="4"
                            stroke-linecap="round" />

                        <!-- Right Eyelid -->
                        <path id="right-eyelid" d="M 535,638 Q 565,625 593,652 L 595,605 Q 560,600 530,615 Z"
                            fill="#15513d" stroke="#0c382b" stroke-width="2" />
                        <path id="right-eyelid-curve" d="M 535,638 Q 565,625 593,652" fill="none" stroke="#257a5e"
                            stroke-width="3" stroke-linecap="round" />
                        <!-- Right Lower Lid -->
                        <path d="M 540,646 Q 565,657 588,652" fill="none" stroke="#04120d" stroke-width="4"
                            stroke-linecap="round" />

                    </g>

                </g> <!-- End Dragon Head -->

                <!-- Snoring Smoke coming from nose -->
                <ellipse cx="615" cy="715" rx="10" ry="10" class="smoke smoke-1" />
                <ellipse cx="615" cy="715" rx="15" ry="12" class="smoke smoke-2" />

                <!-- Zzz Text Elements (now inside breathing body group) -->
                <text x="630" y="700" class="zzz zzz-1">Z</text>
                <text x="645" y="660" class="zzz zzz-2">z</text>
                <text x="670" y="620" class="zzz zzz-3">Z</text>

            </g> <!-- End Dragon Body Group -->

            <!-- Foreground Cave Shadow / Vignette -->
            <path d="M 0,0 L 250,0 Q 150,400 0,800 Z" fill="#050308" opacity="0.8" pointer-events="none" />
            <path d="M 1200,0 L 950,0 Q 1050,400 1200,800 Z" fill="#050308" opacity="0.8" pointer-events="none" />
            <path d="M 0,0 L 1200,0 L 1200,80 Q 600,150 0,80 Z" fill="#050308" opacity="0.6" pointer-events="none" />
            <path d="M 0,800 L 1200,800 L 1200,750 Q 600,680 0,750 Z" fill="#000" opacity="0.7" filter="blur(20px)"
                pointer-events="none" />

        </svg>
    </div>

    <script>
        // Eye Tracking Logic
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            const container = document.getElementById('scene-container');
            const containerRect = container.getBoundingClientRect();

            // Use normalized coordinates for SVG scaling
            // Calculate mouse position relative to the center of the container
            const centerX = containerRect.left + containerRect.width / 2;
            const centerY = containerRect.top + containerRect.height / 2;

            // Base elements where the eye centers are located
            const leftEyeBase = document.getElementById('left-eye-base');
            const rightEyeBase = document.getElementById('right-eye-base');
            const leftPupil = document.getElementById('left-pupil');
            const rightPupil = document.getElementById('right-pupil');

            function updatePupil(baseElement, pupilElement) {
                // Get screen coordinates of the eye base
                const rect = baseElement.getBoundingClientRect();
                const eyeCenterX = rect.left + rect.width / 2;
                const eyeCenterY = rect.top + rect.height / 2;

                // Calculate angle and distance to mouse
                const dx = mouseX - eyeCenterX;
                const dy = mouseY - eyeCenterY;
                const angle = Math.atan2(dy, dx);
                const distance = Math.hypot(dx, dy);

                // Cap the pupil movement so it doesn't leave the eye 
                const maxMoveDistance = 5;
                const moveDist = Math.min(distance / 50, maxMoveDistance);

                const moveX = Math.cos(angle) * moveDist;
                const moveY = Math.sin(angle) * moveDist;

                // Apply translation directly to SVG element
                pupilElement.setAttribute('transform', `translate(${moveX}, ${moveY})`);
            }

            updatePupil(leftEyeBase, leftPupil);
            updatePupil(rightEyeBase, rightPupil);
        });

        // Click to Roar Animation
        let isRoaring = false;
        document.addEventListener('click', () => {
            if (isRoaring) return;
            isRoaring = true;

            // Hide Zzz and smoke by setting display to none
            document.querySelectorAll('.zzz, .smoke').forEach(el => {
                el.style.display = 'none';
            });

            const head = document.getElementById('dragon-head');
            const mouthLine = document.getElementById('dragon-mouth-line');
            const mouthOpen = document.getElementById('dragon-mouth');
            const teeth = document.getElementById('dragon-teeth');
            const fire = document.getElementById('dragon-fire');
            const leftEyelid = document.getElementById('left-eyelid');
            const rightEyelid = document.getElementById('right-eyelid');
            const leftEyelidCurve = document.getElementById('left-eyelid-curve');
            const rightEyelidCurve = document.getElementById('right-eyelid-curve');

            // Eye wide open (move eyelids up)
            leftEyelid.setAttribute('d', 'M 475,628 Q 505,585 533,638 L 530,595 Q 500,590 470,605 Z');
            leftEyelidCurve.setAttribute('d', 'M 475,628 Q 505,585 533,638');
            rightEyelid.setAttribute('d', 'M 535,638 Q 565,595 593,652 L 595,605 Q 560,600 530,615 Z');
            rightEyelidCurve.setAttribute('d', 'M 535,638 Q 565,595 593,652');

            // Head rears up
            head.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            head.style.transformOrigin = '500px 720px';
            head.style.transform = 'rotate(-15deg) translate(-10px, -20px)';

            // Open jaw and fire
            setTimeout(() => {
                mouthLine.style.display = 'none';
                mouthOpen.setAttribute('d', 'M 520,760 Q 560,820 625,750 Q 550,730 520,760');
                mouthOpen.setAttribute('fill', '#4a111a'); // Dark red throat

                // Adjust teeth position for open mouth
                teeth.setAttribute('d', 'M 525,780 L 532,800 L 538,782 M 545,790 L 550,810 L 555,792 M 570,780 L 575,800 L 585,775');

                // Fire breath
                fire.style.opacity = '1';
                fire.style.transform = 'scale(1)';
            }, 150);

            // Reset everything back to sleepy state
            setTimeout(() => {
                head.style.transition = 'transform 1s ease-in-out';
                head.style.transform = 'rotate(0deg) translate(0, 0)';

                mouthLine.style.display = 'block';
                mouthOpen.setAttribute('d', 'M 520,760 Q 580,780 625,750 Q 580,770 520,760');
                mouthOpen.setAttribute('fill', 'transparent');

                // Revert teeth
                teeth.setAttribute('d', 'M 530,760 L 536,775 L 542,760 M 550,765 L 555,785 L 560,768 M 580,765 L 588,785 L 595,760');

                fire.style.opacity = '0';
                fire.style.transform = 'scale(0)';

                // Sleepy eyes revert
                leftEyelid.setAttribute('d', 'M 475,628 Q 505,615 533,638 L 530,595 Q 500,590 470,605 Z');
                leftEyelidCurve.setAttribute('d', 'M 475,628 Q 505,615 533,638');
                rightEyelid.setAttribute('d', 'M 535,638 Q 565,625 593,652 L 595,605 Q 560,600 530,615 Z');
                rightEyelidCurve.setAttribute('d', 'M 535,638 Q 565,625 593,652');

                // Restore Zzz and smoke
                setTimeout(() => {
                    document.querySelectorAll('.zzz, .smoke').forEach(el => el.style.display = '');
                    isRoaring = false;
                }, 1000);

            }, 1600);
        });

        // Handle touch for mobile devices
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                // Simulate a mouse event to reuse logic
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', {
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
                document.dispatchEvent(mouseEvent);
            }
        });

        // Reset eyes if leaving window
        document.addEventListener('mouseleave', () => {
            const leftPupil = document.getElementById('left-pupil');
            const rightPupil = document.getElementById('right-pupil');
            leftPupil.setAttribute('transform', `translate(0, 0)`);
            rightPupil.setAttribute('transform', `translate(0, 0)`);
        });
    </script>

</body>
