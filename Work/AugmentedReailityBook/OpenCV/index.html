<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Book - OpenCV Experiment</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: white;
        }

        #ar-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #overlay {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #status-text {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: auto;
        }

        #start-ar-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #6ee7b7;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 20;
        }

        #start-ar-btn.hidden {
            display: none;
        }

        /* Dev Console */
        #dev-console {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-right: 1px solid #333;
            padding: 15px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 100;
            overflow-y: auto;
        }

        #dev-console.open {
            transform: translateX(0);
        }

        .ctrl {
            margin-bottom: 12px;
        }

        .ctrl label {
            display: block;
            font-size: 10px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .ctrl input {
            width: 100%;
        }

        .v {
            float: right;
            font-size: 10px;
            color: #6ee7b7;
        }

        #dev-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            background: #111;
            color: #6ee7b7;
            border: 1px solid #333;
            border-radius: 50%;
            cursor: pointer;
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div id="ar-container"></div>
    <div id="overlay">
        <span id="status-text">INITIALIZING...</span>
    </div>
    <button id="start-ar-btn">START AR EXPERIMENT</button>
    <div id="dev-console"></div>
    <button id="dev-toggle">⚙</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../app/js/GLTFLoader.js"></script>
    <script src="js/pose-solver.js"></script>
    <script src="js/ar-manager.js"></script>

    <!-- We'll use a modified app.js for this folder -->
    <script src="js/app.js"></script>
</body>

</html>
