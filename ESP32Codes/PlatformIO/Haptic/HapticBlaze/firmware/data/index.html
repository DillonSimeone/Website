<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0d0e10" />
<meta name="color-scheme" content="dark light" />
<title>HapticBlaze</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header class="hb-header">
  <h1>HapticBlaze</h1>
  <span id="status" class="status">Idle</span>
</header>

<main id="root">

  <section data-view="play" hidden>
    <div class="grid" id="pattern-grid"></div>
    <div class="controls">
      <label>Intensity <input type="range" min="0" max="1" step="0.01" value="0.6" id="intensity" /></label>
      <label>Speed     <input type="range" min="0.25" max="4" step="0.01" value="1.0" id="speed" /></label>
    </div>
    <div class="play-controls">
      <button id="btnOn">Play</button>
      <button id="btnOff">Stop</button>
      <button id="btnMute">Mute</button>
    </div>
    <div id="paramsPanel" class="card" hidden></div>
  </section>

  <section data-view="library" hidden>
    <input class="search" id="librarySearch" placeholder="Search patterns…" />
    <div class="grid" id="library-grid"></div>
  </section>

  <section data-view="setup" hidden>
    <h2>Motor setup</h2>
    <p class="dim">Wire each motor's two direction inputs to GPIO pins. Pick them
    in the dropdowns below. Speed pin is optional — leave it as <em>jumper / +5V</em>
    if your driver's ENA pin is hard-tied to power.</p>

    <label>Driver
      <select id="cfgDriver">
        <option value="5">Mini H-Bridge (MX1508, L9110S, DRV8833 mini, TB6612FNG)</option>
        <option value="1">L298N (full-size, ENA per motor)</option>
        <option value="2">DRV8833 (full DIP)</option>
        <option value="3">DRV2605L (I²C haptic driver)</option>
        <option value="4">Raw MOSFET</option>
      </select>
    </label>

    <div id="motorList"></div>

    <button id="btnAddMotor" type="button">+ Add motor</button>

    <label style="margin-top:18px">Standby / Enable pin (optional)
      <select id="cfgStandby"></select>
    </label>

    <label>PWM frequency
      <input id="cfgPwmHz" type="number" min="1000" max="40000" step="100" value="20000" />
    </label>

    <div class="play-controls">
      <button id="btnSaveCfg" class="primary">Save and reboot</button>
      <button id="btnTestBuzz" type="button">Test buzz</button>
    </div>
    <p id="cfgStatus" class="dim"></p>
  </section>

  <section data-view="device" hidden>
    <h2>Device</h2>
    <pre id="diag" class="card mono"></pre>
    <div class="play-controls">
      <button id="btnReboot">Reboot</button>
    </div>
  </section>

</main>

<nav class="tabbar" role="tablist">
  <a href="#/play"    data-tab="play"    role="tab">Play</a>
  <a href="#/library" data-tab="library" role="tab">Library</a>
  <a href="#/setup"   data-tab="setup"   role="tab">Setup</a>
  <a href="#/device"  data-tab="device"  role="tab">Device</a>
</nav>

<script type="module" src="/app.js"></script>
</body>
</html>
