<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeCAD Studio - Haptic Device v2</title>
    <style>
        :root {
            --bg-dark: #020617;
            --accent-brand: #10b981;
            --secondary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-mono: 'Fira Code', 'JetBrains Mono', monospace;
        }

        body {
            margin: 0; padding: 0; background: var(--bg-dark); color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif; overflow: hidden;
            display: flex; height: 100vh;
        }

        #studio-panel {
            width: 420px; background: #0f172a; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 100;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .panel-header {
            padding: 24px; border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .logo {
            font-size: 1.4rem; font-weight: 900; letter-spacing: -1px;
            display: flex; align-items: center; gap: 12px;
        }

        .logo-box {
            width: 32px; height: 32px;
            background: linear-gradient(to bottom right, var(--accent-brand), var(--secondary));
            border-radius: 8px; display: grid; place-items: center; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .panel-content {
            flex: 1; overflow-y: auto; padding: 18px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .section-title {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: #64748b; margin-top: 10px; margin-bottom: 6px; font-weight: 700;
        }

        .param-row {
            padding: 10px 12px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 10px; transition: all 0.2s ease; margin-bottom: 4px;
        }

        .param-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .param-label { font-size: 0.8rem; font-weight: 600; color: #94a3b8; }
        .param-value { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent-brand); background: #1e293b; padding: 1px 6px; border-radius: 4px; }

        input[type="range"] { width: 100%; height: 3px; background: #334155; border-radius: 2px; appearance: none; outline: none; margin: 6px 0; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--accent-brand); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 8px var(--accent-brand); }

        #viewport-container { flex: 1; position: relative; background: #020617; }
        #viewer { width: 100%; height: 100%; }

        .viewport-badge {
            position: absolute; top: 24px; right: 24px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border);
            font-size: 0.8rem; display: flex; align-items: center; gap: 8px; z-index: 1000;
        }

        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        
        button.dl-btn {
            background: #1e293b; color: white; border: 1px solid var(--border);
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
            width: 100%; margin-top: 5px; font-size: 0.75rem; transition: all 0.2s;
        }
        button.dl-btn:hover { background: #334155; border-color: var(--accent-brand); }
        .dl-main { background: var(--accent-brand); color: #111; border: none; }
        .dl-main:hover { background: #059669; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ebtn {
            background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--border);
            padding: 8px 4px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;
            transition: all 0.15s; font-weight: 600;
        }
        .ebtn:hover { background: rgba(255,255,255,0.1); color: white; border-color: #64748b; }
        .ebtn.active { background: #f472b6; color: #111; border-color: #f472b6; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
    </style>
</head>
<body>
    <div id="studio-panel">
        <div class="panel-header">
            <div class="logo">
                <div class="logo-box">F</div>
                ForgeCAD <span style="font-weight: 300; opacity: 0.5;">Haptic v2</span>
            </div>
        </div>

        <div class="panel-content">
            <div class="section-title">Assembly Control</div>
            <div id="params-assembly"></div>

            <div class="section-title">Housing & Tube</div>
            <div id="params-housing"></div>

            <div class="section-title">Chassis & Tracks</div>
            <div id="params-tracks"></div>

            <div class="section-title">Digital Core (ESP/Driver)</div>
            <div id="params-digital"></div>

            <div class="section-title">Haptic Motor</div>
            <div id="params-motor"></div>

            <div class="section-title">Power System</div>
            <div id="params-power"></div>

            <div class="section-title">Motor Clamp</div>
            <div id="params-clamp"></div>

            <div class="section-title">End Cap Settings</div>
            <div id="params-cap"></div>

            <div class="section-title">Cooling & Vents</div>
            <div id="params-vent"></div>

            <div class="section-title">Component Explorer</div>
            <div class="param-group">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px;">
                    <button class="ebtn" data-k="motor">Motor</button>
                    <button class="ebtn" data-k="l298n">L298N</button>
                    <button class="ebtn" data-k="esp32">ESP32</button>
                    <button class="ebtn" data-k="battery">Battery</button>
                    <button class="ebtn" data-k="charger">Charger</button>
                    <button class="ebtn" data-k="">Clear View</button>
                </div>
            </div>

            <div class="section-title" style="margin-top:20px">Manufacturing Export</div>
            <button class="dl-btn dl-main" id="dl-shell">EXPORT SHELL (.STL)</button>
            <button class="dl-btn" id="dl-sled">EXPORT INTERNAL SLED (.STL)</button>
            <div class="grid-2">
                <button class="dl-btn" id="dl-fcap">FRONT CAP</button>
                <button class="dl-btn" id="dl-bcap">BACK CAP</button>
            </div>
        </div>
    </div>

    <div id="viewport-container">
        <div id="viewer"></div>
        <div class="viewport-badge">
            <div class="status-dot"></div>
            FORGECAD STUDIO ACTIVE
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';
        import Module from 'https://unpkg.com/manifold-3d/manifold.js';

        let wasm, Manifold;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, (window.innerWidth - 420) / window.innerHeight, 0.1, 2500);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 420, window.innerHeight);
        document.getElementById('viewer').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(220, 220, 220);
        controls.update();

        // High-end workspace lighting
        scene.add(new THREE.HemisphereLight(0xffffff, 0x111827, 0.8));
        const p1 = new THREE.PointLight(0x3b82f6, 1.5, 1000); p1.position.set(200, 200, 200); scene.add(p1);
        const p2 = new THREE.PointLight(0x10b981, 1, 1000); p2.position.set(-200, 100, -200); scene.add(p2);
        
        const grid = new THREE.GridHelper(600, 60, 0x1e293b, 0x0f172a);
        grid.position.y = -100;
        scene.add(grid);

        let currentMeshes = {};
        let currentModels = {};
        let HL = null;

        // --- ForgeCAD Param API ---
        const PARAMS = {};
        const param = (name, defaultValue, options = {}, category = 'housing') => {
            const id = name.replace(/\s+/g, '-').toLowerCase();
            if (!PARAMS[id]) {
                const type = options.type ?? 'range';
                const min = options.min ?? 0;
                const max = options.max ?? (defaultValue * 3);
                const step = options.step ?? 1;
                PARAMS[id] = { value: defaultValue, min, max, step, name, category, type };
                createParamUI(id, category);
            }
            return PARAMS[id].value;
        };

        function createParamUI(id, cat) {
            const p = PARAMS[id];
            let container = document.getElementById('params-' + cat) || document.getElementById('params-housing');
            
            // Auto-create group if missing
            if (!container.children.length || container.tagName !== 'DIV') {
                const group = document.createElement('div');
                group.className = 'param-group';
                container.appendChild(group);
                container = group;
            } else {
                container = container.querySelector('.param-group') || container;
            }

            const row = document.createElement('div');
            if (p.type === 'checkbox') {
                row.innerHTML = `
                    <div class="ph" style="align-items:center;">
                        ${p.name} <input type="checkbox" id="input-${id}" ${p.value ? 'checked' : ''}>
                    </div>
                `;
            } else {
                row.innerHTML = `
                    <div class="ph">${p.name} <span class="val" id="val-${id}">${p.value}</span></div>
                    <input type="range" id="input-${id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.value}">
                `;
            }
            container.appendChild(row);

            row.querySelector('input').addEventListener(p.type === 'checkbox' ? 'change' : 'input', (e) => {
                const val = p.type === 'checkbox' ? (e.target.checked ? 1 : 0) : parseFloat(e.target.value);
                PARAMS[id].value = val;
                if (p.type !== 'checkbox') document.getElementById(`val-${id}`).innerText = val;
                requestUpdate();
            });
        }

        window.setHighlight = (key) => {
            if (!key) HL = null;
            else HL = key;
            document.querySelectorAll('.ebtn').forEach(b => {
                if(b.dataset.k === key && key !== "") b.classList.add('active');
                else b.classList.remove('active');
            });
            requestUpdate();
        };

        document.querySelectorAll('.ebtn').forEach(b => {
            b.addEventListener('click', () => window.setHighlight(b.dataset.k));
        });

        // --- Modeling Primitive Ops ---
        const cube = (w, h, d) => Manifold.cube([w, h, d], true);
        const cylinder = (r, h, s=64) => Manifold.cylinder(h, r, r, s, true);

        function exportSTL(model, name) {
            if (!model) return;
            const mesh = model.getMesh();
            let stl = `solid ${name}\n`;
            for (let i = 0; i < mesh.triVerts.length; i += 3) {
                const i1 = mesh.triVerts[i], i2 = mesh.triVerts[i+1], i3 = mesh.triVerts[i+2];
                const v1 = [mesh.vertProperties[i1*3], mesh.vertProperties[i1*3+1], mesh.vertProperties[i1*3+2]];
                const v2 = [mesh.vertProperties[i2*3], mesh.vertProperties[i2*3+1], mesh.vertProperties[i2*3+2]];
                const v3 = [mesh.vertProperties[i3*3], mesh.vertProperties[i3*3+1], mesh.vertProperties[i3*3+2]];
                stl += `facet normal 0 0 0\n  outer loop\n    vertex ${v1[0]} ${v1[1]} ${v1[2]}\n    vertex ${v2[0]} ${v2[1]} ${v2[2]}\n    vertex ${v3[0]} ${v3[1]} ${v3[2]}\n  endloop\nendfacet\n`;
            }
            stl += `endsolid ${name}`;
            const blob = new Blob([stl], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${name}.stl`; a.click();
            URL.revokeObjectURL(url);
        }

        async function init() {
            wasm = await Module();
            wasm.setup();
            Manifold = wasm.Manifold;
            requestUpdate();
            animate();
        }

        function requestUpdate() {
            if (!Manifold) return;
            
            // Clean up previous
            Object.values(currentMeshes).forEach(m => scene.remove(m));
            if (currentModels.shell) {
                currentModels.shell.delete(); currentModels.sled.delete();
                currentModels.fCap.delete(); currentModels.bCap.delete();
                if(currentModels.pock) Object.values(currentModels.pock).forEach(p => p.delete());
            }

            try {
                // ForgeCAD High-Level Definition logic
                const expl = param("Explosion", 0, { min:0, max:100 }, "assembly") / 100;
                const wall = param("Wall Thick", 5, { min:1, max:10, step:0.5 }, "housing");
                const gap  = param("Internal Gap", 1, { min:0.5, max:5, step:0.5 }, "housing");
                
                const trkH = param("Track Height", 5, { min:3, max:10, step:0.5 }, "tracks");
                const trkD = param("Track Depth", 2.2, { min:1, max:5, step:0.2 }, "tracks");
                const boardT = param("Board Thick", 3, { min:2, max:6, step:0.5 }, "tracks");

                const espW = param("ESP32 Width", 18, { min:10, max:30 }, "digital");
                const espH = param("ESP32 Height", 4.5, { min:2, max:10, step:0.5 }, "digital");
                const espD = param("ESP32 Depth", 25, { min:10, max:40 }, "digital");
                const l29w = param("L298N Width", 24, { min:10, max:40 }, "digital");
                const l29h = param("L298N Height", 8, { min:5, max:25 }, "digital");
                const l29d = param("L298N Depth", 22, { min:10, max:40 }, "digital");

                const motorW = param("Motor Width", 15, { min:5, max:35 }, "motor");
                const motorH = param("Motor Height", 19, { min:5, max:35 }, "motor");
                const motorL = param("Motor Length", 19, { min:10, max:50 }, "motor");
                const motorB = param("Vibration Buffer", 20, { min:5, max:40 }, "motor");

                const batW = param("Battery Width", 20, { min:10, max:40 }, "power");
                const batH = param("Battery Height", 11, { min:5, max:18 }, "power");
                const batD = param("Battery Depth", 40, { min:20, max:60 }, "power");
                const chW  = param("Charger Width", 17, { min:10, max:30 }, "power");
                const chH  = param("Charger Height", 4, { min:1, max:8, step:0.5 }, "power");
                const chD  = param("Charger Depth", 28, { min:10, max:40 }, "power");

                const clL = param("Clamp Length", 15, { min:5, max:35 }, "clamp");
                const scN = param("Screw Count", 2, { min:1, max:4, step:1 }, "clamp");
                const scD = param("Screw Diameter", 3.2, { min:2, max:6, step:0.2 }, "clamp");

                const capT = param("Cap Thick", 5, { min:2, max:10, step:0.5 }, "cap");
                const capL = param("Lip Depth", 6, { min:2, max:15, step:0.5 }, "cap");
                const usbX = param("USB Pos X", 0, { min:-10, max:10, step:0.5 }, "cap");
                const usbY = param("USB Pos Y", 0, { min:-10, max:10, step:0.5 }, "cap");

                const ventEn    = param("Enable Vents", 0, { type: 'checkbox' }, "vent");
                const ventGridX = param("Vents X", 3, { min:1, max:8 }, "vent");
                const ventGridZ = param("Vents Z", 8, { min:1, max:20 }, "vent");
                const ventSize  = param("Vent Size", 3.2, { min:1, max:6, step:0.2 }, "vent");

                const totalLen = motorL + motorB + l29d + gap + espD + gap + batD + gap + chD + 30;
                const len = totalLen; // Reference parity

                const innerR = 22.5; 
                const radius = innerR + wall;

                // 1. SHELL GENERATION
                let sOuter = cylinder(radius, len, 80);
                let sInner = cylinder(innerR, len + 4, 80);
                let tracks = cube(trkD * 2, trkH, len + 10).translate([-(innerR), 0, 0])
                           .add(cube(trkD * 2, trkH, len + 10).translate([ (innerR), 0, 0]));
                
                let shell = sOuter.subtract(sInner).subtract(tracks);

                // 2. END CAPS
                let capBody = cylinder(radius + 1, capT, 80);
                let capLip = cylinder(radius, capL, 80).subtract(cylinder(innerR + 0.2, capL + 2)).translate([0,0, (capT+capL)/2 - 0.1]);
                let fCap = capBody.add(capLip).translate([0, 0, -(len/2 + capT/2)]);
                
                let usbCut = cube(12, 6, 20).translate([usbX, usbY, 0]);
                let bCap = capBody.add(capLip.rotate([180,0,0])).subtract(usbCut).translate([0, 0, (len/2 + capT/2)]);

                // 3. SLED GENERATION
                const sledW = (innerR - 1) * 2;
                const railW = trkD - 0.3;
                let basePlate = cube(sledW, boardT, len - 10);
                let railL = cube(railW*2, trkH - 0.5, len - 10).translate([-sledW/2, 0, 0]);
                let railR = cube(railW*2, trkH - 0.5, len - 10).translate([ sledW/2, 0, 0]);
                let sled = basePlate.add(railL).add(railR);

                // 4. MOTOR CLAMP (Authentic Feature)
                let zCur = -len / 2 + 5;
                let clR = Math.max(motorW, motorH) / 2 + 1.5;
                let clOuter = cylinder(clR + 4, clL, 64);
                let clInner = cylinder(clR, clL + 2, 64);
                let btmCut = cube(200, 200, clL + 5).translate([0, -100, 0]);
                let halfRing = clOuter.subtract(clInner).subtract(btmCut);
                let tabW = 12, tabT = 4.5;
                let tL = cube(tabW, tabT, clL).translate([-(clR + tabW/2), tabT/2, 0]);
                let tR = cube(tabW, tabT, clL).translate([ (clR + tabW/2), tabT/2, 0]);
                let clamp = halfRing.add(tL).add(tR).translate([0, motorH/4, zCur + motorL/2]);
                sled = sled.add(clamp);

                // SCRW HOLES (Through tabs and sled)
                for (let i = 0; i < scN; i++) {
                    const zOff = (i - (scN - 1) / 2) * (clL / (scN + 0.5));
                    let hL = cylinder(scD / 2, 60, 16).rotate([90, 0, 0]).translate([-(clR + tabW / 2), motorH / 4, zCur + motorL / 2 + zOff]);
                    let hR = cylinder(scD / 2, 60, 16).rotate([90, 0, 0]).translate([(clR + tabW / 2), motorH / 4, zCur + motorL / 2 + zOff]);
                    sled = sled.subtract(hL).subtract(hR);
                    hL.delete(); hR.delete();
                }

                // 5. POCKETS & VENTS
                let pock = {};
                let vHoles = [];
                
                // Motor is sideways [0, 90, 0]
                // Type 130 "Tombstone" intersection logic
                let motCyl = cylinder(motorH/2, motorL + 1).rotate([0, 90, 0]);
                let motBx  = cube(motorL + 1, motorH + 1, motorW + 0.5).rotate([0, 90, 0]);
                pock.motor = motCyl.intersect(motBx).translate([0, motorH/4, zCur + motorL/2]);
                motCyl.delete(); motBx.delete();
                
                const makePocketWithVents = (w, h, d, zP) => {
                    let p = cube(w + 0.5, h + 0.5, d + 0.5).translate([0, h/2, zP + d/2]);
                    if (ventEn > 0.5) {
                        const stepX = w / (ventGridX + 1);
                        const stepZ = d / (ventGridZ + 1);
                        for (let ix = 1; ix <= ventGridX; ix++) {
                            for (let iz = 1; iz <= ventGridZ; iz++) {
                                const vx = -w/2 + ix * stepX;
                                const vz = zP + iz * stepZ;
                                vHoles.push(cylinder(ventSize/2, 40, 8).rotate([90,0,0]).translate([vx, 0, vz]));
                            }
                        }
                    }
                    return p;
                };

                zCur += motorL + motorB;
                pock.l298n = makePocketWithVents(l29w, l29h, l29d, zCur);
                zCur += l29d + gap;
                pock.esp32 = makePocketWithVents(espW, espH, espD, zCur);
                zCur += espD + gap;
                pock.battery = makePocketWithVents(batW, batH, batD, zCur);
                zCur += batD + gap;
                
                pock.charger = makePocketWithVents(chW, chH, chD, len/2 - chD - 5);

                // Subtractions
                Object.values(pock).forEach(p => sled = sled.subtract(p));
                vHoles.forEach(h => { sled = sled.subtract(h); h.delete(); });

                currentModels = { shell, sled, fCap, bCap, pock, expl };

                // RENDER TO SCENE
                const toMesh = (model, color, op, offset=[0,0,0]) => {
                    const m = model.getMesh();
                    const g = new THREE.BufferGeometry();
                    g.setAttribute('position', new THREE.Float32BufferAttribute(m.vertProperties, 3));
                    g.setIndex(new THREE.Uint32BufferAttribute(m.triVerts, 1));
                    g.computeVertexNormals();
                    const mat = new THREE.MeshPhysicalMaterial({ color, transparent:true, opacity:op, metalness:0.4, roughness:0.2, side:THREE.DoubleSide });
                    const mesh = new THREE.Mesh(g, mat);
                    mesh.position.set(...offset); scene.add(mesh);
                    return mesh;
                };

                currentMeshes.shell = toMesh(shell, 0x10b981, 0.25);
                currentMeshes.sled  = toMesh(sled,  0x3b82f6, 1.0, [0, 0, expl*180]);
                currentMeshes.fCap  = toMesh(fCap,  0x10b981, 0.6, [0, expl*80, -expl*60]);
                currentMeshes.bCap  = toMesh(bCap,  0x10b981, 0.6, [0, expl*180, expl*180]);

                if (HL && pock[HL]) {
                    const hlMesh = toMesh(pock[HL], 0xf472b6, 0.8, [0, 0, expl*180]);
                    hlMesh.material.emissive = new THREE.Color(0xf472b6);
                    hlMesh.material.emissiveIntensity = 0.5;
                    currentMeshes.hl = hlMesh;
                }

                // Cleanup wasm handles
                sOuter.delete(); sInner.delete(); tracks.delete();
                capBody.delete(); capLip.delete(); usbCut.delete();
                basePlate.delete(); railL.delete(); railR.delete();
            } catch (e) {
                console.error("Modeling Error:", e);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 420) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 420, window.innerHeight);
        });

        // UI Event Hookups
        document.getElementById('dl-shell').onclick = () => exportSTL(currentModels.shell, "VibrationDevice_Shell");
        document.getElementById('dl-sled').onclick  = () => exportSTL(currentModels.sled, "VibrationDevice_Sled");
        document.getElementById('dl-fcap').onclick  = () => exportSTL(currentModels.fCap, "VibrationDevice_FrontCap");
        document.getElementById('dl-bcap').onclick  = () => exportSTL(currentModels.bCap, "VibrationDevice_BackCap");

        init();
    </script>
</body>
</html>
